baseURL = "https://dedsec-terminal.github.io/"
languageCode = "en-us"
title = "DedSec-Terminal"
theme = "PaperMod"

enableRobotsTXT = true

# =========================
# PAGINATION (FIXED)
# =========================
paginate = 12

# =========================
# TAXONOMY (STABLE)
# =========================
[taxonomies]
category = "categories"
tag = "tags"

# =========================
# OUTPUTS
# =========================
[outputs]
home = ["HTML", "RSS", "JSON"]

# =========================
# SITE PARAMS
# =========================
[params]
description = "Cyber Threat Intelligence & Security Research"
author = "DedSec-Terminal"

defaultTheme = "dark"
disableThemeToggle = true

ShowReadingTime = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowPostNavLinks = false
ShowRssButtonInSectionTermList = true

mainSections = ["posts"]

# =========================
# MENU (MATCHES RSS + INDEX.HTML)
# =========================
[[menu.main]]
identifier = "threat-intel"
name = "Threat Intel"
url = "/categories/threat-intel/"
weight = 10

[[menu.main]]
identifier = "data-breaches"
name = "Data Breaches"
url = "/categories/data-breaches/"
weight = 20

[[menu.main]]
identifier = "cves"
name = "CVEs"
url = "/categories/cves/"
weight = 30

[[menu.main]]
identifier = "malware"
name = "Malware"
url = "/categories/malware/"
weight = 40

[[menu.main]]
identifier = "research"
name = "Research"
url = "/categories/research/"
weight = 50