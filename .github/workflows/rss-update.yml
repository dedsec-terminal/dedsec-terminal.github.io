name: RSS Intel Pipeline

on:
  schedule:
    # Every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: rss-intel
  cancel-in-progress: false

jobs:
  rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure checkpoint exists
        run: |
          touch .seen_posts.json

      - name: Run Intel Balancer v3
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/rss_fetcher.py

      - name: Commit RSS updates
        id: commit_changes
        run: |
          git config user.name "DedSec-Terminal Bot"
          git config user.email "actions@github.com"

          git add content/posts .seen_posts.json

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            git commit -m "RSS Intel Update"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Hugo
        if: steps.commit_changes.outputs.changed == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Setup Pages
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Build Site
        if: steps.commit_changes.outputs.changed == 'true'
        env:
          HUGO_ENV: production
        run: hugo --minify

      - name: Upload Pages Artifact
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy Pages
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v4