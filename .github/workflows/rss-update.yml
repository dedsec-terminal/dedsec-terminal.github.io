name: RSS Intel Pipeline

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests trafilatura groq

      - name: Run RSS Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/rss_fetcher.py

      - name: Commit generated posts
        run: |
          git config user.name "DedSec-Terminal Bot"
          git config user.email "actions@github.com"

          git add content/posts data

          git commit -m "RSS Intel Update" || echo "No changes"
          git push