name: RSS Intel Pipeline

on:
  schedule:
    # every 6 hours
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss-intel
  cancel-in-progress: false

jobs:
  rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure checkpoint exists
        run: |
          touch .seen_posts.json

      - name: Run Intel Balancer v3
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/rss_fetcher.py

      - name: Commit RSS updates
        run: |
          git config user.name "DedSec-Terminal Bot"
          git config user.email "actions@github.com"

          git add \
            content/posts \
            .seen_posts.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "RSS Intel Update"
            git push
          fi